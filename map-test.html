<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenFreeMap Test</title>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #info {
            position: absolute; top: 10px; left: 10px; z-index: 1;
            background: white; padding: 10px; border: 2px solid black;
            font-family: monospace; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">Map Status: Initializing...</div>
    <div id="map"></div>
    <script>
        const info = document.getElementById('info');
        try {
            const map = new maplibregl.Map({
                container: 'map',
                style: 'https://tiles.openfreemap.org/styles/liberty',
                center: [121.5645, 25.0339],
                zoom: 12
            });

            map.on('load', () => {
                info.innerText = 'Map Status: Loaded Successfully ✅';
                info.style.color = 'green';
                console.log('Map loaded successfully');
            });

            map.on('error', (e) => {
                info.innerText = 'Map Status: Error ❌ (Check Console)';
                info.style.color = 'red';
                console.error('Map error:', e);
            });
        } catch (err) {
            info.innerText = 'Map Status: Crash 💥';
            console.error('Map crash:', err);
        }
    </script>
</body>
</html>
